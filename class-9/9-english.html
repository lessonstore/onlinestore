<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Class 9 English</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
  <a href="class-9.html" class="block p-4">⬅ Back to Class 9</a>
  <div class="max-w-4xl mx-auto p-6 bg-white rounded-2xl shadow-lg">
    <h1 class="text-3xl font-bold">Class 9 English</h1>
    <p class="mt-4 text-slate-700">Essay writing, literature study, and English practice for Class 9 learners.</p>
  </div>
<div style="position: fixed; bottom: 20px; right: 20px; z-index: 1000;">
<a id="whatsapp-link" href="#" target="_blank">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="Contact via WhatsApp" style="width: 60px; height: 60px; border-radius: 50%; box-shadow: 0 4px 8px rgba(0,0,0,0.3);">
</a>
</div>

<script>
var title = document.title;
var parts = title.split(' ');
var message = '';
if (title === 'Lesson Plan Store') {
    message = 'Hi, I want to inquire about lesson plans on your website.';
} else if (parts[0] === 'Class' && parts.length >= 2) {
    var classNum = parts[1];
    if (parts.length === 2) {
        message = 'Hi, I want to inquire about subjects for Class ' + classNum + '.';
    } else {
        var subject = parts.slice(2).join(' ');
        message = 'Hi, I want to inquire about ' + subject + ' for Class ' + classNum + '.';
    }
} else {
    message = 'Hi, I have a question about your website.';
}
var phone = '923126450070';
var url = 'https://wa.me/' + phone + '?text=' + encodeURIComponent(message);
document.getElementById('whatsapp-link').href = url;
</script></body>
</html>
