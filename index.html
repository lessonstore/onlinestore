<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lesson Plan Store</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-100 min-h-screen">
  <header class="max-w-5xl mx-auto px-6 py-10 text-center">
    <h1 class="text-4xl font-bold text-slate-900">Lesson Plan Store</h1>
    <p class="mt-3 text-slate-600">Select a class to explore lesson plans, resources, and activities.</p>
  </header>

  <main class="max-w-5xl mx-auto px-6 pb-12">
    <div class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3">
      <a href="class-6/class-6.html" class="card">Class 6</a>
      <a href="class-7/class-7.html" class="card">Class 7</a>

    </div>
  </main>

<div style="position: fixed; bottom: 20px; right: 20px; z-index: 1000;">
<a id="whatsapp-link" href="#" target="_blank">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="Contact via WhatsApp" style="width: 60px; height: 60px; border-radius: 50%; box-shadow: 0 4px 8px rgba(0,0,0,0.3);">
</a>
</div>

<script>
var title = document.title;
var parts = title.split(' ');
var message = '';
if (title === 'Lesson Plan Store') {
    message = 'Hi, I want to inquire about lesson plans on your website.';
} else if (parts[0] === 'Class' && parts.length >= 2) {
    var classNum = parts[1];
    if (parts.length === 2) {
        message = 'Hi, I want to inquire about subjects for Class ' + classNum + '.';
    } else {
        var subject = parts.slice(2).join(' ');
        message = 'Hi, I want to inquire about ' + subject + ' for Class ' + classNum + '.';
    }
} else {
    message = 'Hi, I have a question about your website.';
}
var phone = '923126450070'; // Replace with actual WhatsApp number
var url = 'https://wa.me/' + phone + '?text=' + encodeURIComponent(message);
document.getElementById('whatsapp-link').href = url;
</script>
